services:
  - type: web
    name: prooflens-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r code/requirements.txt && pip install -r api/requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false          # set manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /api/health
